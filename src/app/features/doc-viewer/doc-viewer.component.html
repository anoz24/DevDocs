@if (currentSection) {
  <div class="doc-header">
    <h1 class="doc-h1">{{ currentSection.title }}</h1>
    <button mat-icon-button
            class="bookmark-btn"
            [class.bookmarked]="favorites.isFavorite(currentSection.id)"
            (click)="favorites.toggle(currentSection)"
            aria-label="Toggle bookmark">
      <mat-icon>
        {{ favorites.isFavorite(currentSection.id) ? 'bookmark' : 'bookmark_border' }}
      </mat-icon>
    </button>
  </div>

  <article class="doc-content">
    <markdown
      [data]="currentSection.content"
      (ready)="onMarkdownReady()">
    </markdown>

    <!-- Render children sections inline -->
    @for (child of currentSection.children; track child.id) {
      <section class="doc-child-section">
        <h2 [id]="child.id" class="doc-h2">{{ child.title }}</h2>
        <markdown
          [data]="child.content"
          (ready)="onMarkdownReady()">
        </markdown>

        @for (sub of child.children; track sub.id) {
          <h3 [id]="sub.id" class="doc-h3">{{ sub.title }}</h3>
          <markdown
            [data]="sub.content"
            (ready)="onMarkdownReady()">
          </markdown>
        }
      </section>
    }
  </article>
} @else {
  <div class="doc-empty">
    <mat-icon class="empty-icon">description</mat-icon>
    <p>Select a section from the sidebar to begin reading.</p>
  </div>
}
