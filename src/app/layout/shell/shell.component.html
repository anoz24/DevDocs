<div class="shell-wrapper">
  <!-- Top Toolbar -->
  <header class="toolbar">
    <div class="brand-logo"><span>Dev</span>Docs</div>
    <div class="toolbar-spacer"></div>
    <button mat-icon-button (click)="themeService.toggle()" aria-label="Toggle dark mode">
      <mat-icon>{{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>
  </header>

  <!-- 3-Column Layout -->
  <div class="shell-layout">
    <app-sidebar class="panel panel--left"></app-sidebar>

    <main class="panel panel--center">
      <router-outlet></router-outlet>
    </main>

    <app-toc class="panel panel--right"></app-toc>
  </div>
</div>
